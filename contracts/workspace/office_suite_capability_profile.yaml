profile_id: workspace-office-profile-v1
status: draft
owners:
  domain_repo: SocioProphet/prophet-workspace
  runtime_repo: SocioProphet/prophet-platform
  sourceos_repo: SociOS-Linux/source-os
  memory_repo: SocioProphet/memory-mesh
  desktop_search_repo: SocioProphet/lampstand
  ontology_repo: SocioProphet/ontogenesis
capability_families:
  - docs
  - sheets
  - slides
  - files
  - collaboration
  - migration
  - ai_assistance
  - workflow_agents
  - memory_recall
  - search
  - ontology_alignment
capability_map:
  docs:
    local_editor: libreoffice
    cloud_editor: collabora
    ai_surface: required
  sheets:
    local_editor: libreoffice
    cloud_editor: collabora
    ai_surface: required
  slides:
    local_editor: libreoffice
    cloud_editor: collabora
    ai_surface: required
  files:
    local_editor: sourceos-shell
    cloud_editor: fogstack-drive
    ai_surface: required
  collaboration:
    comments: required
    suggestions: required
    versions: required
    sharing: required
  migration:
    microsoft_office_scan: required
    google_workspace_scan: required
    parity_scoring: required
  ai_assistance:
    grounded_rewrite: required
    summarize: required
    spreadsheet_formula_help: required
    deck_generation: target
  workflow_agents:
    starters: target
    steps: target
    approvals: target
  memory_recall:
    recall_before_action: required
    writeback_after_action: required
    user_project_memory: target
  search:
    local_desktop_search: required
    cloud_workspace_search: required
    indexed_office_discovery: required
  ontology_alignment:
    office_semantic_units: required
    jsonld_boundary: required
    external_schema_mapping: required
    provenance_alignment: target
cross_repo_bindings:
  sourceos:
    - office desktop profile
    - font and mime integration
    - local parity smoke tests
    - lampstand desktop handoff
    - local semantic extraction handoff
  platform:
    - office cloud runtime
    - wopi host
    - document and ai action schemas
    - foggraph indexing and orchestration
    - ontology-aware extraction and mapping
  workspace:
    - product semantics
    - user/admin surface expectations
    - capability parity contract
  memory_mesh:
    - recall-before-action
    - writeback-after-action
    - memory policy and retention hooks
  lampstand:
    - local desktop file discovery
    - inspectable local office search health
    - local search handoff into office surfaces
  ontogenesis:
    - office vocabulary alignment
    - jsonld and graph boundary surfaces
    - provenance-aware semantic mapping
